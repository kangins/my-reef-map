<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Eruda 모바일 개발자 도구 -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
  // URL에 ?eruda=1 이 있거나 localStorage에 저장된 경우 활성화
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    const erudaEnabled = urlParams.get('eruda') === '1' || localStorage.getItem('eruda') === 'on';
    
    if (erudaEnabled) {
      eruda.init({
        tool: ['console', 'elements', 'network', 'resources', 'info', 'snippets', 'sources'],
        useShadowDom: true,
        autoScale: true,
        defaults: {
          displaySize: 50,
          transparency: 0.9,
          theme: 'Monokai Pro'
        }
      });
      
      // 유용한 스니펫 추가
      eruda.add({
        name: 'CustomTools',
        init($el) {
          this._$el = $el;
        },
        show() {
          this._$el.html(`
            <div style="padding:20px;color:#fff;">
              <h3>🌊 어초 지도 디버그 도구</h3>
              <button onclick="console.log('줌:', map.getZoom())" style="margin:5px;padding:10px;">현재 줌 확인</button>
              <button onclick="console.log('수심 레이어:', depthContourLayer.getLayers().length + '개')" style="margin:5px;padding:10px;">수심 레이어 확인</button>
              <button onclick="drawDepthContours()" style="margin:5px;padding:10px;">등심선 강제 실행</button>
              <button onclick="console.log('캐시:', depthCache.size + '개')" style="margin:5px;padding:10px;">캐시 확인</button>
              <button onclick="depthCache.clear(); console.log('캐시 삭제됨')" style="margin:5px;padding:10px;">캐시 초기화</button>
              <button onclick="localStorage.removeItem('eruda'); location.reload()" style="margin:5px;padding:10px;background:#f44;">Eruda 끄기</button>
            </div>
          `);
        },
        hide() {}
      });
      
      localStorage.setItem('eruda', 'on');
      console.log('%c🔧 Eruda 활성화됨', 'color:#4CAF50;font-size:16px;font-weight:bold;');
      console.log('끄려면: localStorage.removeItem("eruda") 후 새로고침');
    }
  })();
</script>

<style>

  #splashSkip {

  #sosBox .btns {

  #panel hr { border:none; border-top:1px solid #ddd; margin:8px 0; }
  #panel button {

  #panel button:hover { background:#e7e7e7; }

  #search { width:100%; padding:6px; margin-bottom:6px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; font-size:inherit; }
  #toggleBtn {

  #nav {

  #compass {
    width:70px; height:70px; margin:0 auto 8px; position:relative;
    border:3px solid #ffcc44; border-radius:50%; background:rgba(0,0,0,0.4);
  }
  #compass .arrow {
    position:absolute; top:50%; left:50%; width:4px; height:32px;
    background:#ff3355; transform-origin:2px 32px;
    transform:translate(-50%,-100%) rotate(0deg);
    transition:transform 0.5s ease; border-radius:2px; box-shadow:0 0 6px #ff3355;
  }
  #compass .arrow::before {
    content:''; position:absolute; top:-6px; left:-4px;
    width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent;
    border-bottom:10px solid #ff3355;
  }
  #compass .n {
    position:absolute; top:2px; left:50%; transform:translateX(-50%);

  }
  #nav .close {

  #modalBox h3 { margin:0 0 12px; color:#003366; }
  #modalBox ul { list-style:none; padding:0; margin:0; }
  #modalBox li {
    padding:10px 8px; border-bottom:1px solid #eee;
    display:flex; justify-content:space-between; align-items:center;
  }
  #modalBox li:last-child { border-bottom:none; }
  #modalBox a { color:#0066cc; text-decoration:none; font-weight:500; flex:1; }
  #modalBox .region { color:#888; font-size:0.9em; margin-left:8px; }
  #modalBox .btnAct { border:none; border-radius:5px; padding:4px 8px;
    cursor:pointer; font-size:0.9em; margin-left:4px; color:#fff; }
  #modalBox .close {
    background:#666; color:#fff; border:none; border-radius:5px;
    padding:8px 16px; cursor:pointer; float:right; margin-top:10px;

  #modalBox .empty { color:#999; text-align:center; padding:20px; }

  #driftAlert {
    position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:2500;
    background:#ff3355; color:#fff; padding:12px 20px; border-radius:8px;
    font-weight:bold; display:none; box-shadow:0 4px 15px rgba(0,0,0,0.5);
    animation:shake 0.5s infinite;
  }
  @keyframes shake { 0%,100%{transform:translateX(-50%);} 25%{transform:translateX(-52%);} 75%{transform:translateX(-48%);} }

  /* 🆕 수심 등심선 범례 */
  .depth-legend {
    background:rgba(30,30,40,0.9);
    color:#fff;
    padding:8px 10px;
    border-radius:6px;
    line-height:1.5;

    display:block;

    background:rgba(255,255,255,0.95) !important;
    border-radius:8px !important;

  .leaflet-control-layers-expanded label {
    padding:4px 0 !important;
  }
  body.night .leaflet-control-layers {
    background:rgba(40,0,0,0.92) !important;
    color:#fcc !important;
  }

  body.night #map { filter:invert(0.9) hue-rotate(180deg) brightness(0.95) saturate(0.7); }
  body.night #panel { background:rgba(40,0,0,0.92); color:#ffaaaa; }
  body.night #panel button { background:#400; color:#fcc; border-color:#600; }
  body.night #modalBox { background:#222; color:#eee; }
  body.night #modalBox h3 { color:#ffcc44; }
  body.night #modalBox li { border-color:#444; }
  body.night #modalBox a { color:#88ccff; }

  @media (max-width:600px) {
    #panel { max-width:220px; padding:10px; }
    #toggleBtn { display:block; }
    #panel.hidden { display:none; }
    #nav .stat .value { font-size:1.3em; }
    #compass { width:60px; height:60px; }
    #font-size-control { top:80px; }
  }
</style>
</head>
<body>

<!-- ========== 스플래시 스크린 ========== -->
<div id="splash">
  <img id="splashImg" src="splash.png" alt="동해카약보트 덕후피싱">
  <button id="splashSkip" onclick="hideSplash()">건너뛰기 ✕</button>
  <div id="splashLoader">
    <span class="spinner"></span><span id="splashText">지도를 불러오는 중...</span>
  </div>
</div>

<!-- ========== SOS 커스텀 확인 모달 ========== -->
<div id="sosModal" onclick="if(event.target.id==='sosModal') closeSosModal()">
  <div id="sosBox">
    <div class="icon">🚨</div>
    <h2>해양 긴급 신고</h2>
    <div class="coord">
      <b>📍 현재 좌표</b>
      <span id="sosCoord">위치 확인 중...</span>
      <div class="copied" id="sosCopied"></div>
    </div>
    <div class="warn">
      ⚠️ 실제 응급상황에만 신고하세요<br>
      허위 신고 시 법적 처벌 대상입니다
    </div>
    <div class="btns">
      <button class="btnCancel" onclick="closeSosModal()">취소</button>
      <button class="btnCall" onclick="callEmergency()">📞 119 통화</button>
    </div>
    <div class="extra">

const SPLASH_MIN_MS = 2000;

function hideSplash(){
  if (splashHidden) return;

  const elapsed = Date.now() - splashStartTime;
  const wait = Math.max(0, SPLASH_MIN_MS - elapsed);
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) s.classList.add('hide');
    setTimeout(() => { if (s) s.style.display = 'none'; }, 900);
  }, wait);
}

function changeFontSize(delta) {
  const current = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--app-font-scale')) || 1;
  const newScale = Math.max(0.7, Math.min(1.8, current + delta));
  document.documentElement.style.setProperty('--app-font-scale', newScale);
  document.getElementById('font-size-display').textContent = Math.round(newScale * 100) + '%';
  localStorage.setItem('fontScale', newScale);
}
(function restoreFontSize() {
  const saved = parseFloat(localStorage.getItem('fontScale'));
  if (saved && saved >= 0.7 && saved <= 1.8) {
    document.documentElement.style.setProperty('--app-font-scale', saved);
    document.addEventListener('DOMContentLoaded', () => {
      const display = document.getElementById('font-size-display');
      if (display) display.textContent = Math.round(saved * 100) + '%';
    });
  }
})();

async function loadAllReefs(){

          className:'', iconSize:[36,36]

async function showReef(reef){

  } else {

  }

/* ======================================================
   5. 거리·방위·DMS
====================================================== */
function calcBearing(lat1,lon1,lat2,lon2){
  const φ1 = lat1*Math.PI/180, φ2 = lat2*Math.PI/180;
  const Δλ = (lon2-lon1)*Math.PI/180;
  const y = Math.sin(Δλ)*Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}
function bearingArrow(b){
  const dirs = ['↑','↗','→','↘','↓','↙','←','↖'];
  return dirs[Math.round(b/45) % 8];
}
function toDMS(v, type){
  const abs = Math.abs(v);
  const d = Math.floor(abs);
  const m = Math.floor((abs-d)*60);
  const s = (((abs-d)*60-m)*60).toFixed(1);
  const dir = type==='lat' ? (v>=0?'N':'S') : (v>=0?'E':'W');
  return `${d}°${m}'${s}"${dir}`;
}
function haversine(la1,lo1,la2,lo2){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLa=toR(la2-la1), dLo=toR(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function escapeStr(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>

<script>
/* ======================================================
   6. 경로/직선
====================================================== */
let routeCtrl = null, straightLine = null;

function navigateTo(lat, lon){
  if (!myPos){ alert('먼저 현위치를 잡아주세요'); return; }
  clearRoute();
  routeCtrl = L.Routing.control({
    waypoints:[ myPos, L.latLng(lat,lon) ],
    router: L.Routing.osrmv1({ serviceUrl:'https://router.project-osrm.org/route/v1' }),
    lineOptions:{ styles:[{color:'#ff3300', weight:5, opacity:0.8}] },
    show:true, addWaypoints:false, draggableWaypoints:false, fitSelectedRoutes:true
  }).addTo(map);
  showClearBtn();
}
function drawStraightLine(lat, lon){
  if (!myPos){ alert('먼저 현위치를 잡아주세요'); return; }
  clearRoute();
  const dist = (map.distance(myPos, [lat,lon])/1000).toFixed(2);
  const b = calcBearing(myPos.lat, myPos.lng, lat, lon).toFixed(0);
  straightLine = L.polyline([myPos, [lat,lon]], { color:'#ff0066', weight:3, dashArray:'10,8' }).addTo(map);
  straightLine.bindTooltip(`${dist}km · ${b}°`, { permanent:true, direction:'center' }).openTooltip();
  map.fitBounds(straightLine.getBounds(), { padding:[50,50] });
  showClearBtn();
}
function clearRoute(){
  if (routeCtrl){ map.removeControl(routeCtrl); routeCtrl = null; }
  if (straightLine){ map.removeLayer(straightLine); straightLine = null; }
  hideClearBtn();
}
function showClearBtn(){ document.getElementById('clearBtn').classList.add('show'); }
function hideClearBtn(){ document.getElementById('clearBtn').classList.remove('show'); }

/* ======================================================
   7. 실시간 항해
====================================================== */
let navTarget = null;
let navLine = null;
let navMarker = null;
let navWatchId = null;
let navHistory = [];
let alertLevels = new Set();
let currentWaypointIndex = -1;

function startNavigation(name, region, lat, lon, wpIndex){
  stopNavigation(true);
  navTarget = { name, region, lat, lon };
  currentWaypointIndex = (typeof wpIndex === 'number') ? wpIndex : -1;

  document.getElementById('navName').textContent = name;
  document.getElementById('navRegion').textContent = `(${region})`;
  document.getElementById('nav').classList.add('show');

  const wpInfoEl = document.getElementById('wpInfo');
  if (currentWaypointIndex >= 0){
    const total = getWaypoints().length;
    wpInfoEl.style.display = 'block';
    wpInfoEl.textContent = `📍 경유지 ${currentWaypointIndex + 1} / ${total}`;
  } else {
    wpInfoEl.style.display = 'none';
  }

  navMarker = L.circleMarker([lat, lon], {
    radius:14, color:'#ff3355', fillColor:'#ff3355', fillOpacity:0.4, weight:3
  }).addTo(map);

  if (!navigator.geolocation){ alert('위치 서비스 미지원'); return; }
  ensureWatchPosition();
  document.getElementById('info').style.display = 'none';
}

function onNavUpdate(position){
  const { latitude:lat, longitude:lon, speed } = position.coords;
  const now = Date.now();
  myPos = L.latLng(lat, lon);

  if (tracking) recordTrackPoint(lat, lon, position.coords.altitude, now);
  if (anchorPos) checkDrift(lat, lon);
  if (!navTarget) return;

  navHistory.push({ lat, lon, t:now });
  if (navHistory.length > 5) navHistory.shift();

  const distKm = map.distance([lat, lon], [navTarget.lat, navTarget.lon]) / 1000;
  const bearing = calcBearing(lat, lon, navTarget.lat, navTarget.lon);

  let speedMps = speed;
  if (!speedMps && navHistory.length >= 2){
    const p0 = navHistory[navHistory.length-2];
    const p1 = navHistory[navHistory.length-1];
    const d = map.distance([p0.lat,p0.lon], [p1.lat,p1.lon]);
    const dt = (p1.t - p0.t)/1000;
    speedMps = dt > 0 ? d/dt : 0;
  }
  const speedKn = (speedMps || 0) * 1.94384;

  let eta = '-';
  if (speedMps && speedMps > 0.3){
    const secLeft = (distKm*1000) / speedMps;
    if (secLeft < 60) eta = `${Math.round(secLeft)}초`;
    else if (secLeft < 3600) eta = `${Math.round(secLeft/60)}분`;
    else eta = `${Math.floor(secLeft/3600)}시간 ${Math.round((secLeft%3600)/60)}분`;
  }

  const distEl = document.getElementById('navDist');
  const unitEl = document.getElementById('navDistUnit');
  if (distKm < 1){ distEl.textContent = (distKm*1000).toFixed(0); unitEl.textContent = 'm'; }
  else { distEl.textContent = distKm.toFixed(2); unitEl.textContent = 'km'; }
  document.getElementById('navBearing').textContent = `${bearing.toFixed(0)} ${bearingArrow(bearing)}`;
  document.getElementById('navSpeed').textContent = speedKn.toFixed(1);
  document.getElementById('navETA').textContent = eta;
  document.getElementById('compassArrow').style.transform = `translate(-50%,-100%) rotate(${bearing}deg)`;

  if (navLine) map.removeLayer(navLine);
  navLine = L.polyline([[lat,lon], [navTarget.lat, navTarget.lon]], {
    color:'#ff3355', weight:4, opacity:0.85, dashArray:'12,8'
  }).addTo(map);

  checkProximityAlert(distKm);

  const arrival = document.getElementById('navArrival');
  if (distKm * 1000 < 30){
    arrival.style.display = 'block';
    if (!alertLevels.has('arrived')){
      alertLevels.add('arrived');
      vibrate([200,100,200,100,400]);
      if (currentWaypointIndex >= 0){
        setTimeout(() => advanceToNextWaypoint(), 2000);
      }
    }
  } else { arrival.style.display = 'none'; }
}

function checkProximityAlert(distKm){
  const meters = distKm * 1000;
  const thresholds = [
    { m:500, key:'500', pattern:[200] },
    { m:200, key:'200', pattern:[200,100,200] },
    { m:100, key:'100', pattern:[300,100,300] },
    { m:50,  key:'50',  pattern:[400,100,400,100,400] },
  ];
  for (const t of thresholds){
    if (meters < t.m && !alertLevels.has(t.key)){
      alertLevels.add(t.key);
      vibrate(t.pattern);
    }
    if (meters > t.m * 1.3) alertLevels.delete(t.key);
  }
}
function vibrate(pattern){ if (navigator.vibrate) navigator.vibrate(pattern); }

function stopNavigation(silent){
  if (navLine){ map.removeLayer(navLine); navLine = null; }
  if (navMarker){ map.removeLayer(navMarker); navMarker = null; }
  navTarget = null;
  navHistory = [];
  alertLevels.clear();
  currentWaypointIndex = -1;

let tracking = false;

    if (currentTrack.length > 1){
      if (confirm(`항적 저장? (${currentTrack.length}pt, ${trackLength().toFixed(2)}km)`)){
        saveTrack();
      }
    }
    ensureWatchPosition();
  }
}
function recordTrackPoint(lat, lon, ele, time){
  const last = currentTrack[currentTrack.length-1];
  if (last){
    const d = map.distance([last.lat,last.lon], [lat,lon]);
    if (d < 5) return;
  }
  currentTrack.push({ lat, lon, ele:ele||0, time });
  if (!trackLine){
    trackLine = L.polyline([[lat,lon]], { color:'#00cc00', weight:4, opacity:0.8 }).addTo(map);
  } else {
    trackLine.addLatLng([lat,lon]);
  }
}
function trackLength(){
  let total = 0;
  for (let i=1; i<currentTrack.length; i++){
    total += map.distance([currentTrack[i-1].lat, currentTrack[i-1].lon], [currentTrack[i].lat, currentTrack[i].lon]);
  }
  return total / 1000;
}
function saveTrack(){
  const tracks = JSON.parse(localStorage.getItem('tracks')||'[]');
  const now = new Date();
  tracks.push({
    id: now.getTime(),
    name: `항적_${now.getMonth()+1}/${now.getDate()}_${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`,
    points: currentTrack, distKm: trackLength(), date: now.toISOString()
  });
  localStorage.setItem('tracks', JSON.stringify(tracks));
  alert(`💾 저장 완료`);
  currentTrack = [];
  if (trackLine){ map.removeLayer(trackLine); trackLine = null; }
}

function exportTrackGPX(idx){
  const tracks = JSON.parse(localStorage.getItem('tracks')||'[]');
  const t = tracks[idx];
  let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="ReefMap" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>${t.name}</name><time>${t.date}</time></metadata>
  <trk><name>${t.name}</name><trkseg>
`;
  t.points.forEach(p => {
    gpx += `    <trkpt lat="${p.lat}" lon="${p.lon}">`;
    if (p.ele) gpx += `<ele>${p.ele}</ele>`;
    if (p.time) gpx += `<time>${new Date(p.time).toISOString()}</time>`;
    gpx += `</trkpt>\n`;
  });
  gpx += `  </trkseg></trk></gpx>`;
  const blob = new Blob([gpx], { type:'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${t.name}.gpx`;
  document.body.appendChild(a); a.click(); a.remove();
}

const tideCache = new Map();
async function fetchTide(obsCode, dateStr){
  const key = obsCode + '_' + dateStr;
  if (tideCache.has(key)) return tideCache.get(key);
  const cached = sessionStorage.getItem('tide_' + key);
  if (cached){
    const data = JSON.parse(cached);
    if (data.length > 0){
      tideCache.set(key, data);
      return data;
    }
  }
  const khoaUrl = `${TIDE_API}?serviceKey=${KHOA_KEY}&pageNo=1&numOfRows=100&type=json&obsCode=${obsCode}&reqDate=${dateStr}`;
  const url = `https://corsproxy.io/?${encodeURIComponent(khoaUrl)}`;

  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text);
    let data = json?.body?.items?.item || json?.response?.body?.items?.item || [];
    if (!Array.isArray(data)) data = [data];
    tideCache.set(key, data);
    if (data.length > 0) sessionStorage.setItem('tide_' + key, JSON.stringify(data));
    return data;
  } catch(e) {
    console.warn('조석 API 오류', e);
    return [];
  }
}

function getSunMoon(date, lat, lon) {
  if (typeof SunCalc === 'undefined') return null;
  try {
    const sun = SunCalc.getTimes(date, lat, lon);
    const moon = SunCalc.getMoonTimes(date, lat, lon);
    const phase = SunCalc.getMoonIllumination(date);

    const phases = [
      {min:0.00, max:0.03, name:'삭(신월)', icon:'🌑'},
      {min:0.03, max:0.22, name:'초승달',   icon:'🌒'},
      {min:0.22, max:0.28, name:'상현달',   icon:'🌓'},
      {min:0.28, max:0.47, name:'차오르는 달', icon:'🌔'},
      {min:0.47, max:0.53, name:'보름달',   icon:'🌕'},
      {min:0.53, max:0.72, name:'기우는 달', icon:'🌖'},
      {min:0.72, max:0.78, name:'하현달',   icon:'🌗'},
      {min:0.78, max:0.97, name:'그믐달',   icon:'🌘'},
      {min:0.97, max:1.01, name:'삭(신월)', icon:'🌑'}
    ];
    const moonPhase = phases.find(p => phase.phase >= p.min && phase.phase < p.max) || phases[0];

    return {
      sunrise: sun.sunrise,
      sunset: sun.sunset,
      moonrise: moon.rise,
      moonset: moon.set,
      moonPhase: moonPhase,
      illumination: (phase.fraction * 100).toFixed(0)
    };
  } catch(e) {
    console.warn('SunCalc 오류', e);
    return null;
  }
}

/* ---------- 조과지수 (0~10) ---------- */
function calcFishingScore(mulddae, tideData, sunMoon, now) {
  let score = 0;
  const mulddaeScore = Math.min(3, mulddae.power - 1);
  score += mulddaeScore;

  let tideScore = 0;
  if (tideData && tideData.length) {
    let minDiff = Infinity;
    tideData.forEach(t => {
      const dt = new Date((t.predcDt || '').replace(' ','T'));
      const diff = Math.abs(dt - now);
      if (diff < minDiff) minDiff = diff;
    });
    const minToTide = minDiff / 60000;
    if (minToTide < 60) tideScore = 3;
    else if (minToTide < 120) tideScore = 2;
    else if (minToTide < 180) tideScore = 1;
  }
  score += tideScore;

  let timeScore = 0;
  if (sunMoon) {
    const sunriseDiff = Math.abs(sunMoon.sunrise - now) / 60000;
    const sunsetDiff = Math.abs(sunMoon.sunset - now) / 60000;
    const minDiff = Math.min(sunriseDiff, sunsetDiff);
    if (minDiff < 60) timeScore = 2;
    else if (minDiff < 120) timeScore = 1;
  }
  score += timeScore;

  let moonScore = 0;
  if (sunMoon) {
    const illum = parseInt(sunMoon.illumination);
    if (illum > 70) moonScore = 2;
    else if (illum > 30) moonScore = 1;
  }
  score += moonScore;

  return Math.min(10, score);
}

/* ---------- 유리 시간대 계산 ---------- */
function getBestTimes(tideData, sunMoon) {
  const times = [];
  const fmt = d => {
    if (!d) return null;
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${h}:${m}`;
  };

  if (sunMoon && sunMoon.sunrise) {
    const sr = new Date(sunMoon.sunrise);
    times.push({
      start: fmt(new Date(sr - 3600000)),
      end: fmt(new Date(sr.getTime() + 3600000)),
      stars: 3,
      reason: '일출',
      sortKey: sr.getTime()
    });
  }
  if (sunMoon && sunMoon.sunset) {
    const ss = new Date(sunMoon.sunset);
    times.push({
      start: fmt(new Date(ss - 3600000)),
      end: fmt(new Date(ss.getTime() + 3600000)),
      stars: 3,
      reason: '일몰',
      sortKey: ss.getTime()
    });
  }

  if (tideData) {
    tideData.forEach(t => {
      const dt = new Date((t.predcDt || '').replace(' ','T'));
      if (isNaN(dt.getTime())) return;
      const isHigh = t.extrSe === '1' || t.extrSe === '2';
      times.push({
        start: fmt(new Date(dt - 1800000)),
        end: fmt(new Date(dt.getTime() + 1800000)),
        stars: 2,
        reason: isHigh ? '만조' : '간조',
        sortKey: dt.getTime()
      });
    });
  }

  return times.filter(t => t.start && t.end).sort((a,b) => a.sortKey - b.sortKey);
}

/* ---------- 통합 낚시 정보 표시 ---------- */
async function showTideFor(lat, lon){
  const {station, dist} = nearestStation(lat, lon);
  if(!station) return '';

  const now = new Date();
  const today = await fetchTide(station.code, ymd(now));

  const mulddae = getMulddae(now);
  const sunMoon = getSunMoon(now, lat, lon);
  const score = calcFishingScore(mulddae, today, sunMoon, now);
  const bestTimes = getBestTimes(today, sunMoon);

  const scoreEmoji = score >= 8 ? '🔥' : score >= 6 ? '⭐' : score >= 4 ? '👍' : '💤';
  const scoreColor = score >= 8 ? '#ff5555' : score >= 6 ? '#ffcc44' : score >= 4 ? '#88ccff' : '#888888';
  const scoreLabel = score >= 8 ? '최상' : score >= 6 ? '양호' : score >= 4 ? '보통' : '저조';

  let nextTide = '';
  if (today && today.length) {
    const next = today.find(t => {
      const dt = new Date((t.predcDt || '').replace(' ','T'));
      return dt > now;
    });
    if (next) {
      const dt = new Date(next.predcDt.replace(' ','T'));
      const diff = (dt - now) / 60000;
      const h = Math.floor(diff/60), m = Math.floor(diff%60);
      const isHigh = next.extrSe === '1' || next.extrSe === '2';
      nextTide = `⏱ 다음 ${isHigh?'만조':'간조'} ${h}시간 ${m}분 후`;
    }
  }

  let summary = `<hr>`;
  summary += `<div class="fishing-score" style="color:${scoreColor}">🎣 조과지수 ${score}/10 ${scoreEmoji} <small style="font-weight:normal;opacity:0.8">(${scoreLabel})</small></div>`;
  summary += `<div style="color:${mulddae.color}">🌊 ${mulddae.name} · ${mulddae.desc}</div>`;
  if (nextTide) summary += `<div>${nextTide}</div>`;
  summary += `<a class="detail-toggle" onclick="toggleTideDetail(this)">자세히 ▼</a>`;

  let detail = `<div class="detail-panel" style="display:none">`;

  if (today && today.length) {
    detail += `<div class="section-title">📊 조석 (${station.name}, ${dist.toFixed(0)}km)</div>`;
    today.forEach(t => {
      const level = parseFloat(t.predcTdlvVl);
      const isHigh = t.extrSe === '1' || t.extrSe === '2';
      const time = (t.predcDt || '').substring(11,16);
      detail += `<div style="color:${isHigh?'#88ccff':'#ffcc88'}">${isHigh?'🔼 만조':'🔽 간조'} ${time} (${level.toFixed(0)}cm)</div>`;
    });
  } else {
    detail += `<div class="section-title">📊 조석</div><div><i>정보 없음</i></div>`;
  }

  if (sunMoon) {
    const fmt = d => d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '--:--';
    detail += `<div class="section-title">☀️ 일출/일몰</div>`;
    detail += `<div>☀️ ${fmt(sunMoon.sunrise)} · 🌇 ${fmt(sunMoon.sunset)}</div>`;

    detail += `<div class="section-title">🌙 달</div>`;
    detail += `<div>${sunMoon.moonPhase.icon} ${sunMoon.moonPhase.name} (조명 ${sunMoon.illumination}%)</div>`;
    detail += `<div>🌙 월출 ${fmt(sunMoon.moonrise)} · 월몰 ${fmt(sunMoon.moonset)}</div>`;
  }

  if (bestTimes.length) {
    detail += `<div class="section-title">🎯 조과 좋은 시간대</div>`;
    bestTimes.forEach(t => {
      const stars = '⭐'.repeat(t.stars);
      detail += `<div>${t.start}-${t.end} ${stars} <small>(${t.reason})</small></div>`;
    });
  }

  detail += `</div>`;

  return summary + detail;
}

function toggleTideDetail(el){
  const panel = el.nextElementSibling;
  if (!panel) return;
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  el.textContent = isHidden ? '접기 ▲' : '자세히 ▼';
}

/* ======================================================
   🆕 16. 수심 등심선 시스템
====================================================== */
function getDepthColor(depth) {
  if (depth < 5)   return '#ff4444';
  if (depth < 10)  return '#ff8844';
  if (depth < 20)  return '#ffcc44';
  if (depth < 30)  return '#88ccff';
  if (depth < 50)  return '#4488ff';
  if (depth < 100) return '#2266cc';
  if (depth < 200) return '#003399';
  if (depth < 500) return '#001155';
  return '#000833';
}

async function fetchDepthData(ymin, ymax, xmin, xmax) {
  const cacheKey = `${ymin.toFixed(3)}_${ymax.toFixed(3)}_${xmin.toFixed(3)}_${xmax.toFixed(3)}`;
  if (depthCache.has(cacheKey)) return depthCache.get(cacheKey);

  const rangeArea = (ymax - ymin) * (xmax - xmin);
  if (rangeArea > 0.5) {
    console.log('🌊 범위가 너무 넓음, 요청 생략');
    return [];
  }

  const url = `${DEPTH_API}?serviceKey=${DEPTH_KEY}&type=json&ymin=${ymin}&ymax=${ymax}&xmin=${xmin}&xmax=${xmax}&pageNo=1&numOfRows=3000`;
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

  console.log('🌊 수심 API 호출 중...');

  try {
    const res = await fetch(proxyUrl);
    const json = await res.json();

    const resultCode = json?.header?.resultCode;
    if (resultCode !== '0' && resultCode !== '00') {
      console.warn('🌊 API 오류:', json?.header?.resultMsg);
      return [];
    }

    const items = json?.body?.items?.item || [];
    const points = Array.isArray(items) ? items : [items];
    const total = json?.body?.totalCount || 0;

    const parsed = points
      .map(p => ({
        lat: parseFloat(p.lat),
        lon: parseFloat(p.lon),
        depth: parseFloat(p.dpwt)
      }))
      .filter(p => !isNaN(p.lat) && !isNaN(p.lon) && !isNaN(p.depth));

    depthCache.set(cacheKey, parsed);
    console.log(`🌊 수심 데이터 ${parsed.length}/${total}개 로드`);
    return parsed;
  } catch (e) {
    console.error('수심 API 오류:', e);
    return [];
  }
}

function interpolateGrid(points, gridSize, minLat, maxLat, minLon, maxLon) {
  const grid = new Array(gridSize * gridSize).fill(0);
  const latStep = (maxLat - minLat) / gridSize;
  const lonStep = (maxLon - minLon) / gridSize;

  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      const cellLat = minLat + (i + 0.5) * latStep;
      const cellLon = minLon + (j + 0.5) * lonStep;

      let sumWeight = 0;
      let sumValue = 0;
      let nearestVal = null;
      let nearestDist = Infinity;

      points.forEach(p => {
        const dLat = p.lat - cellLat;
        const dLon = p.lon - cellLon;
        const dist2 = dLat * dLat + dLon * dLon;
        if (dist2 < nearestDist) {
          nearestDist = dist2;
          nearestVal = p.depth;
        }
        if (dist2 < 0.00001) {
          sumWeight = 1;
          sumValue = p.depth;
          return;
        }
        const w = 1 / dist2;
        sumWeight += w;
        sumValue += w * p.depth;
      });

      grid[i * gridSize + j] = sumWeight > 0 ? sumValue / sumWeight : (nearestVal || 0);
    }
  }
  return grid;
}

async function drawDepthContours() {
  const zoom = map.getZoom();

  if (zoom < 9) {
    depthContourLayer.clearLayers();
    return;
  }

  const bounds = map.getBounds();
  const ymin = bounds.getSouth();
  const ymax = bounds.getNorth();
  const xmin = bounds.getWest();
  const xmax = bounds.getEast();

  if ((ymax - ymin) > 2 || (xmax - xmin) > 2) {
    depthContourLayer.clearLayers();
    return;
  }

  const points = await fetchDepthData(ymin, ymax, xmin, xmax);
  if (points.length < 4) {
    depthContourLayer.clearLayers();
    return;
  }

  const gridSize = zoom >= 12 ? 80 : zoom >= 10 ? 60 : 40;
  const grid = interpolateGrid(points, gridSize, ymin, ymax, xmin, xmax);

  const maxDepth = Math.max(...grid);
  const thresholds = DEPTH_THRESHOLDS.filter(t => t < maxDepth);
  if (thresholds.length === 0) {
    depthContourLayer.clearLayers();
    return;
  }

  const contours = d3.contours()
    .size([gridSize, gridSize])
    .thresholds(thresholds)(grid);

  depthContourLayer.clearLayers();

  const latStep = (ymax - ymin) / gridSize;
  const lonStep = (xmax - xmin) / gridSize;

  contours.forEach(contour => {
    const transformedCoords = contour.coordinates.map(polygon =>
      polygon.map(ring =>
        ring.map(([x, y]) => [
          xmin + x * lonStep,
          ymin + y * latStep
        ])
      )
    );

    const geojson = {
      type: 'Feature',
      geometry: {
        type: 'MultiPolygon',
        coordinates: transformedCoords
      },
      properties: { depth: contour.value }
    };

    const color = getDepthColor(contour.value);
    L.geoJSON(geojson, {
      style: {
        color: color,
        weight: 1.2,
        fillOpacity: 0.15,
        fillColor: color
      }
    }).bindTooltip(`${contour.value}m`, { sticky: true })
      .addTo(depthContourLayer);
  });

  console.log(`🌊 등심선 ${contours.length}개 표시`);
}

function scheduleDepthRedraw() {

/* ======================================================
   20. 오프라인 타일
====================================================== */
function latLngToTile(lat, lon, z){
  const n = 2 ** z;
  return {
    x: Math.floor((lon + 180) / 360 * n),
    y: Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180)) / Math.PI) / 2 * n),
  };
}
async function precacheCurrentView(maxZoom = 14){
  if (!navigator.serviceWorker.controller){ alert('SW 미활성. 새로고침'); return; }
  const b = map.getBounds();
  const urls = [];
  const startZ = Math.max(map.getZoom(), 8);
  for (let z = startZ; z <= maxZoom; z++){
    const nw = latLngToTile(b.getNorth(), b.getWest(), z);
    const se = latLngToTile(b.getSouth(), b.getEast(), z);
    for (let x = nw.x; x <= se.x; x++)
      for (let y = nw.y; y <= se.y; y++)
        urls.push(`https://a.tile.openstreetmap.org/${z}/${x}/${y}.png`);
  }
  if (!confirm(`${urls.length}개 타일 (~${(urls.length*15/1024).toFixed(1)}MB)?`)) return;
  navigator.serviceWorker.controller.postMessage({ type:'PRECACHE_TILES', urls });
  navigator.serviceWorker.onmessage = e => {
    if (e.data.type === 'DONE') alert(`✅ ${e.data.done}개 완료`);
  };
}
